services:
  # Backend Server
  - type: web
    name: careerforge-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: careerforge-db
          property: connectionString

  # Frontend (Vite)
  - type: web
    name: careerforge-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: careerforge-api
          type: web
          property: host
        suffix: /api

databases:
  - name: careerforge-db
    plan: free
    databaseName: careerforge
    user: admin
