<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preparation Hub - CareerForge</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="app-container">
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
      <div id="header-placeholder"></div>

      <section class="content-body" id="content-body">
      </section>
    </main>
  </div>

  <script type="module">
    import { initLayout } from '/src/components/Layout.js';
    import { PrepView } from '/src/views/prep.js';
    import { stateStore } from '/src/state.js';
    import { getQueryParams } from '/src/utils.js';

    document.addEventListener('DOMContentLoaded', () => {
      initLayout('Preparation Hub');
      
      const container = document.getElementById('content-body');
      const params = getQueryParams();
      
      const render = () => {
        container.innerHTML = PrepView.getHTML(params);
        PrepView.init(params);
      };

      stateStore.subscribe(render);
      render();
    });
  </script>
</body>
</html>
